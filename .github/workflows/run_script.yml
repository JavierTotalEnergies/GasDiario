name: Ejecutar script diario

on:
  schedule:
    - cron: "0 7 * * *"   # Cada día a las 07:00 UTC (09:00 España)
  workflow_dispatch:

jobs:
  ejecutar:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repo
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Instalar dependencias
        run: |
          pip install requests pandas openpyxl urllib3

      - name: ▶Ejecutar script
        env:
          API_KEY: ${{ secrets.API_KEY }}
        run: python gas_diario.py

      - name: Guardar cambios
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add Historico_OilPrice.xlsx
          git commit -m "Actualización automática" || echo "No hay cambios"
          git push